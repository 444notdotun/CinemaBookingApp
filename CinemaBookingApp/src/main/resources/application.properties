spring.application.name=CinemaBookingApp
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=cinema_booking_db
server.port = 8080
app.jwt.secret=${SECRETKEY}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000
app.payStack.secret=${PAYSTACK_SECRETKEY}
spring.mail.host=smtp.resend.com
spring.mail.port=465
spring.mail.username=resend
spring.mail.password=${RESEND_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true