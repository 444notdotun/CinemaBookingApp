spring.application.name=CinemaBooking
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=cinema_booking_db
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
server.port = ${PORT:8080}
app.jwt.secret=${SECRETKEY}
app.jwt.expiration=${JWT_EXPIRATION}
app.jwt.refresh-expiration=${JWT_REFRESH}
app.payStack.secret=${PAYSTACK_SECRETKEY}
spring.mail.host=smtp.resend.com
spring.mail.port=${RESEND_PORT}
spring.mail.username=resend
spring.mail.password=${RESEND_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.data.mongodb.root.password=${MONGO_INITDB_ROOT_PASSWORD}
spring.data.mongodb.root.username=${MONGO_INITDB_ROOT_USERNAME}
spring.data.mongodb.root.url=${MONGO_URL}
spring.data.mongodb.root.mongohost=${MONGOHOST}
spring.data.mongodb.root.mongopassword=${MONGOPASSWORD}
spring.data.mongodb.root.mongoport=${MONGOPORT}
spring.data.mongodb.root.mongouser=${MONGOUSER}




